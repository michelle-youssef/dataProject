<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Browse Bundles — Ur Food</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">🍇 Ur<span>Food</span></a>
    <ul class="nav-links">
      <li><a href="browse.html">Browse</a></li>
      <li><a href="user-dashboard.html">My Orders</a></li>
      <li><a href="login.html" class="nav-btn">Login</a></li>
    </ul>
  </nav>

  <div class="section">
    <div class="section-header">
      <h2>All Bundles 🔮</h2>
      <p>Claim before they're gone!</p>
    </div>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterCards('all', this)">All</button>
      <button class="filter-btn" onclick="filterCards('restaurant', this)">🍔 Restaurants</button>
      <button class="filter-btn" onclick="filterCards('cafe', this)">☕ Cafés</button>
      <button class="filter-btn" onclick="filterCards('Beirut', this)">📍 Beirut</button>
      <button class="filter-btn" onclick="filterCards('Jbeil', this)">📍 Jbeil</button>
    </div>
    <div class="cards-grid" id="all-cards"></div>
  </div>

  <footer><p>♥</p></footer>

  <script src="js/data.js"></script>
  <script>
    function renderCards(list) {
      const container = document.getElementById('all-cards');
      container.innerHTML = '';
      if (list.length === 0) { container.innerHTML = '<p style="color:var(--gray)">No bundles found.</p>'; return; }
      list.forEach(r => {
        const discount = Math.round((1 - r.bundle.price / r.bundle.originalPrice) * 100);
        container.innerHTML += `
          <div class="bundle-card" onclick="window.location='bundle-detail.html?id=${r.id}'">
            <div class="card-image">
              <img src="${r.image}" alt="${r.name}" onerror="this.src='https://via.placeholder.com/400x300?text=${r.name}'"/>
              <span class="card-badge">-${discount}%</span>
              <span class="card-qty">🔮 ${r.bundle.quantity} left</span>
            </div>
            <div class="card-body">
              <div class="card-restaurant">${r.name} · ${r.type}</div>
              <div class="card-title">${r.bundle.title}</div>
              <div class="card-location">📍 ${r.location}</div>
              <div class="card-items">
                ${r.bundle.items.slice(0,3).map(i => `<span class="item-tag">${i}</span>`).join('')}
                ${r.bundle.items.length > 3 ? `<span class="item-tag">+${r.bundle.items.length - 3} more</span>` : ''}
              </div>
              <div class="card-footer">
                <div class="card-price">
                  <span class="price-new">$${r.bundle.price}</span>
                  <span class="price-old">$${r.bundle.originalPrice}</span>
                </div>
                <button class="btn-claim">Claim</button>
              </div>
            </div>
          </div>`;
      });
    }
    function filterCards(filter, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (filter === 'all') return renderCards(restaurants);
      renderCards(restaurants.filter(r => r.type === filter || r.city === filter));
    }
    renderCards(restaurants);
  </script>

  <div id="fairy" onclick="sparkle(this)">🧚‍♀️</div>
  <style>
    #fairy {
      position:fixed; bottom:24px; right:24px; font-size:2.2rem; cursor:pointer; z-index:9999;
      user-select:none; font-family:monospace; background:#f4f1ec;
      border:3px solid #2d6a4f; border-radius:8px; padding:6px 8px;
      box-shadow:4px 4px 0px #1a3d2b, inset 1px 1px 0px rgba(255,255,255,0.9);
      transition:transform 0.1s, box-shadow 0.1s;
    }
    #fairy:hover { box-shadow:2px 2px 0px #1a3d2b, inset 1px 1px 0px rgba(255,255,255,0.9); transform:translate(2px,2px); }
    #fairy:active { box-shadow:0px 0px 0px #1a3d2b; transform:translate(4px,4px); }
    .spark { position:fixed; pointer-events:none; font-size:1.1rem; animation:flyup 1s ease-out forwards; z-index:9999; font-family:monospace; }
    @keyframes flyup { 0%{opacity:1;transform:translateY(0) scale(1)} 25%{transform:translateY(-30px) scale(1.2) rotate(15deg)} 50%{transform:translateY(-60px) scale(0.9) rotate(-15deg)} 100%{opacity:0;transform:translateY(-120px) scale(0.3)} }
  </style>
  <script>
    function sparkle(el) {
      el.style.transition='transform 0.5s'; el.style.transform='rotate(360deg) scale(1.3)';
      setTimeout(()=>{el.style.transform='rotate(0deg) scale(1)'},500);
      const emojis=['✨','💜','🌸','💚','🩷','💫','🌺','💜','✨','🌸','⬛','🟪','🟩','🩷'];
      for(let i=0;i<14;i++){
        setTimeout(()=>{
          const spark=document.createElement('div'); spark.className='spark';
          spark.textContent=emojis[Math.floor(Math.random()*emojis.length)];
          spark.style.left=(Math.random()*window.innerWidth)+'px';
          spark.style.top=(Math.random()*window.innerHeight)+'px';
          spark.style.fontSize=(Math.random()>0.5?'0.8rem':'1.4rem');
          document.body.appendChild(spark); setTimeout(()=>spark.remove(),1000);
        },i*60);
      }
    }
  </script>
</body>
</html>
