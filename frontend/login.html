<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Ur Food</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo"> Crave <span> 'N </span>Save˚ʚ♡ɞ˚</a>
  </nav>

  <div class="login-page">
    <div class="login-card" autocomplete="off">
      <h2>Welcome back!</h2>
      <p>Sign in to claim your food bundles</p>
      
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="off" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" />
      </div>

      <button class="btn-login" onclick="handleLogin()">Sign In</button>

      <div class="login-footer">
        Don't have an account? <a href="signup.html">Sign up free</a>
      </div>

      <div id="error-msg" style="color:red; text-align:center; margin-top:1rem; display:none;"></div>
    </div>
  </div>

  <script>
    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');

      errorMsg.style.display = 'none';

      if (!email || !password) {
        errorMsg.textContent = 'Please fill in all fields!';
        errorMsg.style.display = 'block';
        return;
      }

      try {
        const response = await fetch('http://localhost:3000/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          errorMsg.textContent = data.message || 'Login failed';
          errorMsg.style.display = 'block';
          return;
        }

        localStorage.setItem('loggedIn', 'true');
        localStorage.setItem('user', JSON.stringify(data.user));

        // Keep old dashboard keys working
        localStorage.setItem('user_id', data.user.id);
        localStorage.setItem('role', data.user.roleId);
        localStorage.setItem('first_name', data.user.firstName);

        if (data.user.restaurantId) {
          localStorage.setItem('restaurant_id', data.user.restaurantId);
        }

        // Redirect based on role
        if (Number(data.user.roleId) === 3) {
          window.location.href = 'restaurant-dashboard.html';
        } else {
          window.location.href = 'index.html';
        }

      } catch (err) {
        errorMsg.textContent = 'Could not connect to server. Is it running?';
        errorMsg.style.display = 'block';
        console.error(err);
      }
    }
  </script>

  <div id="fairy" onclick="sparkle(this)">🧚‍♀️</div>

  <style>
    #fairy {
      position:fixed; bottom:24px; right:24px; font-size:2.2rem; cursor:pointer; z-index:9999;
      user-select:none; font-family:monospace; background:#f4f1ec;
      border:3px solid #2d6a4f; border-radius:8px; padding:6px 8px;
      box-shadow:4px 4px 0px #1a3d2b, inset 1px 1px 0px rgba(255,255,255,0.9);
      transition:transform 0.1s, box-shadow 0.1s;
    }

    #fairy:hover {
      box-shadow:2px 2px 0px #1a3d2b, inset 1px 1px 0px rgba(255,255,255,0.9);
      transform:translate(2px,2px);
    }

    #fairy:active {
      box-shadow:0px 0px 0px #1a3d2b;
      transform:translate(4px,4px);
    }

    .spark {
      position:fixed;
      pointer-events:none;
      font-size:1.1rem;
      animation:flyup 1s ease-out forwards;
      z-index:9999;
      font-family:monospace;
    }

    @keyframes flyup {
      0% { opacity:1; transform:translateY(0) scale(1); }
      25% { transform:translateY(-30px) scale(1.2) rotate(15deg); }
      50% { transform:translateY(-60px) scale(0.9) rotate(-15deg); }
      100% { opacity:0; transform:translateY(-120px) scale(0.3); }
    }
  </style>

  <script>
    function sparkle(el) {
      el.style.transition = 'transform 0.5s';
      el.style.transform = 'rotate(360deg) scale(1.3)';

      setTimeout(() => {
        el.style.transform = 'rotate(0deg) scale(1)';
      }, 500);

      const emojis = ['🪐','🍓','🌸','🫧','💚','🩷','💫','🌺','💜','✨','🌸','🤎','☕','🩷'];

      for (let i = 0; i < 14; i++) {
        setTimeout(() => {
          const spark = document.createElement('div');
          spark.className = 'spark';
          spark.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          spark.style.left = (Math.random() * window.innerWidth) + 'px';
          spark.style.top = (Math.random() * window.innerHeight) + 'px';
          spark.style.fontSize = (Math.random() > 0.5 ? '0.8rem' : '1.4rem');
          document.body.appendChild(spark);

          setTimeout(() => spark.remove(), 1000);
        }, i * 60);
      }
    }
  </script>

</body>
</html>
