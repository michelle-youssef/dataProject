<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bundle Detail — Ur Food</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">  Ur<span>Food ˚ʚ♡ɞ˚</span></a>
    <ul class="nav-links">
      <li><a href="browse.html">Browse</a></li>
      <li><a href="login.html" class="nav-btn">Login</a></li>
    </ul>
  </nav>

  <div class="detail-page" id="detail-content"></div>

  <footer><p>.₊̣.̩✧ *̣̩˚̣̣⁺̣‧.₊̣̇.‧⁺̣˚̣̣*̣̩⋆·̩̩.̩̥·̩̩⋆*̣̩˚̣̣⁺̣‧.₊̣̇.‧⁺̣˚̣̣*̣̩ ✧·.̩₊̣</p></footer>

  <script src="js/data.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id'));
    const restaurant = restaurants.find(r => r.id === id);
    const container = document.getElementById('detail-content');
    if (!restaurant) {
      container.innerHTML = '<p>Bundle not found. <a href="browse.html">Go back</a></p>';
    } else {
      const b = restaurant.bundle;
      const discount = Math.round((1 - b.price / b.originalPrice) * 100);
      container.innerHTML = `
        <a href="browse.html" style="color:var(--off-white); font-weight:600; display:inline-block; margin-bottom:1.5rem; letter-spacing:0.05em; text-transform:uppercase; font-size:0.8rem;">← Back to Browse</a>
        <div class="detail-image">
          <img src="${restaurant.image}" alt="${restaurant.name}" onerror="this.src='https://via.placeholder.com/800x320?text=${restaurant.name}'"/>
        </div>
        <div class="detail-header">
          <p style="color:var(--gray); margin-bottom:6px; font-size:0.82rem; text-transform:uppercase; letter-spacing:0.1em;">📍 ${restaurant.location} · ${restaurant.type}</p>
          <h1>${b.title}</h1>
          <div class="detail-price">
            <span class="price-new">$${b.price}</span>
            <span class="price-old">$${b.originalPrice}</span>
            <span class="card-badge" style="position:static; display:inline-block;">-${discount}%</span>
          </div>
          <p style="color:var(--gray);">⏰ Pickup: ${b.pickupTime}</p>
          <p style="color:var(--gray); margin-top:4px;">.⋆✴︎ ${b.quantity} bags left</p>
        </div>
        <div class="detail-items">
          <h3>What's inside this bag?</h3>
          <p style="color:var(--gray); font-size:0.9rem; margin-bottom:1rem; font-style:italic;">${b.description}</p>
          <div class="items-list">
            ${b.items.map(item => `<span class="item-tag">${item}</span>`).join('')}
          </div>
        </div>
        <button class="btn-primary" style="width:100%; padding:16px; font-size:0.95rem;" onclick="claimBundle()">
          ☆ Claim This Bag for $${b.price} ☆
        </button>`;
    }
    function claimBundle() {
      if (!localStorage.getItem('loggedIn')) {
        alert('Please login first to claim a bundle!');
        window.location.href = 'login.html';
      } else {
        alert('Bundle claimed! 🎉 Go pick it up during the pickup window.');
        window.location.href = 'user-dashboard.html';
      }
    }
  </script>

  <div id="fairy" onclick="sparkle(this)">🧚‍♀️</div>
  <style>
    #fairy {
      position:fixed; bottom:24px; right:24px; font-size:2.2rem; cursor:pointer; z-index:9999;
      user-select:none; font-family:monospace; background:#f4f1ec;
      border:3px solid #2d6a4f; border-radius:8px; padding:6px 8px;
      box-shadow:4px 4px 0px #1a3d2b, inset 1px 1px 0px rgba(255,255,255,0.9);
      transition:transform 0.1s, box-shadow 0.1s;
    }
    #fairy:hover { box-shadow:2px 2px 0px #1a3d2b, inset 1px 1px 0px rgba(255,255,255,0.9); transform:translate(2px,2px); }
    #fairy:active { box-shadow:0px 0px 0px #1a3d2b; transform:translate(4px,4px); }
    .spark { position:fixed; pointer-events:none; font-size:1.1rem; animation:flyup 1s ease-out forwards; z-index:9999; font-family:monospace; }
    @keyframes flyup { 0%{opacity:1;transform:translateY(0) scale(1)} 25%{transform:translateY(-30px) scale(1.2) rotate(15deg)} 50%{transform:translateY(-60px) scale(0.9) rotate(-15deg)} 100%{opacity:0;transform:translateY(-120px) scale(0.3)} }
  </style>
  <script>
    function sparkle(el) {
      el.style.transition='transform 0.5s'; el.style.transform='rotate(360deg) scale(1.3)';
      setTimeout(()=>{el.style.transform='rotate(0deg) scale(1)'},500);
      const emojis = ['🪐','🍓','🌸','🫧','💚','🩷','💫','🌺','💜','✨','🌸','🤎','☕','🩷'];
      for(let i=0;i<14;i++){
        setTimeout(()=>{
          const spark=document.createElement('div'); spark.className='spark';
          spark.textContent=emojis[Math.floor(Math.random()*emojis.length)];
          spark.style.left=(Math.random()*window.innerWidth)+'px';
          spark.style.top=(Math.random()*window.innerHeight)+'px';
          spark.style.fontSize=(Math.random()>0.5?'0.8rem':'1.4rem');
          document.body.appendChild(spark); setTimeout(()=>spark.remove(),1000);
        },i*60);
      }
    }
  </script>
</body>
</html>
