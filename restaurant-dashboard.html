<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Restaurant Dashboard — Ur Food</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .add-form {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2rem;
      margin-bottom: 2rem;
    }
    .add-form h2 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      margin-bottom: 1.5rem;
      font-size: 1.3rem;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media(max-width:600px){ .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">🌿 Taka<span>Left</span></a>
    <ul class="nav-links">
      <li><a href="browse.html">View Live Site</a></li>
      <li><a href="#" onclick="logout()">Logout</a></li>
    </ul>
  </nav>

  <div class="dashboard">
    <div class="dashboard-header">
      <h1>Restaurant Dashboard 🍽️</h1>
      <p>Welcome, <strong id="resto-name"></strong>! Manage your surplus bundles here.</p>
    </div>

    <!-- Add Bundle Form -->
    <div class="add-form">
      <h2>➕ Add New Bundle</h2>
      <div class="form-row">
        <div class="form-group">
          <label>Bundle Title</label>
          <input type="text" id="bundle-title" placeholder="e.g. Tonight's Surprise Bag" />
        </div>
        <div class="form-group">
          <label>Pickup Time</label>
          <input type="text" id="bundle-pickup" placeholder="e.g. 9:00 PM - 10:00 PM" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Price ($)</label>
          <input type="number" id="bundle-price" placeholder="e.g. 5" />
        </div>
        <div class="form-group">
          <label>Original Price ($)</label>
          <input type="number" id="bundle-original" placeholder="e.g. 18" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Quantity Available</label>
          <input type="number" id="bundle-qty" placeholder="e.g. 5" />
        </div>
        <div class="form-group">
          <label>Items (comma separated)</label>
          <input type="text" id="bundle-items" placeholder="e.g. Burger, Fries, Juice" />
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="bundle-desc" placeholder="Brief description of the bundle" />
      </div>
      <button class="btn-primary" style="margin-top:0.5rem;" onclick="addBundle()">Add Bundle 🔮</button>
    </div>

    <!-- My Bundles -->
    <h2 style="font-family:'Syne',sans-serif; font-weight:700; margin-bottom:1rem;">My Bundles</h2>
    <div class="orders-table">
      <table>
        <thead>
          <tr>
            <th>Bundle Title</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Pickup Time</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="bundles-body"></tbody>
      </table>
    </div>
  </div>

  <footer>
    <p>♥</p>
  </footer>

  <script src="js/data.js"></script>
  <script>
    document.getElementById('resto-name').textContent = currentRestaurant.name;

    // Show this restaurant's bundle
    const myRestaurant = restaurants.find(r => r.id === currentRestaurant.id);
    const tbody = document.getElementById('bundles-body');

    function renderBundles() {
      tbody.innerHTML = '';
      const b = myRestaurant.bundle;
      tbody.innerHTML = `
        <tr>
          <td><strong>${b.title}</strong></td>
          <td style="color:var(--green); font-weight:600;">$${b.price}</td>
          <td>${b.quantity} left</td>
          <td style="color:var(--gray);">${b.pickupTime}</td>
          <td>
            <button onclick="deleteBundle()" style="background:var(--orange); color:white; padding:6px 14px; border-radius:50px; font-size:0.8rem; font-weight:600;">Remove</button>
          </td>
        </tr>
      `;
    }

    renderBundles();

    function addBundle() {
      const title = document.getElementById('bundle-title').value;
      const price = document.getElementById('bundle-price').value;
      const original = document.getElementById('bundle-original').value;
      const qty = document.getElementById('bundle-qty').value;
      const pickup = document.getElementById('bundle-pickup').value;
      const items = document.getElementById('bundle-items').value;
      const desc = document.getElementById('bundle-desc').value;

      if (!title || !price || !qty || !pickup) {
        alert('Please fill in all required fields!');
        return;
      }

      alert(`Bundle "${title}" added successfully! 🎉\nIn the real app this would save to the database.`);

      // Clear form
      ['bundle-title','bundle-price','bundle-original','bundle-qty','bundle-pickup','bundle-items','bundle-desc']
        .forEach(id => document.getElementById(id).value = '');
    }

    function deleteBundle() {
      if (confirm('Are you sure you want to remove this bundle?')) {
        alert('Bundle removed! In the real app this would delete from the database.');
      }
    }

    function logout() {
      localStorage.removeItem('loggedIn');
      localStorage.removeItem('userType');
      window.location.href = 'index.html';
    }
  </script>

</body>
</html>
