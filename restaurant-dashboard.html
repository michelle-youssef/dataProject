<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Restaurant Dashboard — UrFood</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">🍇 Ur<span>Food</span></a>
    <ul class="nav-links">
      <li><a href="browse.html">View Live Site</a></li>
      <li><a href="#" onclick="logout()">Logout</a></li>
    </ul>
  </nav>

  <div class="dashboard">
    <div class="dashboard-header">
      <h1>Restaurant Dashboard 🍽️</h1>
      <p>Welcome, <strong id="resto-name" style="color:var(--white);"></strong>! Manage your surplus bundles here.</p>
    </div>

    <!-- Add Bundle Form -->
    <div class="add-form">
      <h2>➕ Add New Bundle</h2>
      <div class="form-row">
        <div class="form-group">
          <label>Bundle Title</label>
          <input type="text" id="bundle-title" placeholder="e.g. Tonight's Surprise Bag" />
        </div>
        <div class="form-group">
          <label>Pickup Time</label>
          <input type="text" id="bundle-pickup" placeholder="e.g. 9:00 PM - 10:00 PM" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Price ($)</label>
          <input type="number" id="bundle-price" placeholder="e.g. 5" />
        </div>
        <div class="form-group">
          <label>Original Price ($)</label>
          <input type="number" id="bundle-original" placeholder="e.g. 18" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Quantity Available</label>
          <input type="number" id="bundle-qty" placeholder="e.g. 5" />
        </div>
        <div class="form-group">
          <label>Items (comma separated)</label>
          <input type="text" id="bundle-items" placeholder="e.g. Burger, Fries, Juice" />
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="bundle-desc" placeholder="Brief description of the bundle" />
      </div>
      <button class="btn-primary" style="margin-top:0.5rem;" onclick="addBundle()">Add Bundle 🛍️</button>
    </div>

    <!-- My Bundles -->
    <h2 style="font-family:'IM Fell English',serif; font-style:italic; font-weight:400; font-size:1.6rem; margin-bottom:1rem; color:var(--white);">My Bundles</h2>
    <div class="orders-table">
      <table>
        <thead>
          <tr>
            <th>Bundle Title</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Pickup Time</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="bundles-body"></tbody>
      </table>
    </div>
  </div>

  <footer>
    <p>Made with <span>♥</span> in Lebanon — UrFood © 2024</p>
  </footer>

  <script src="js/data.js"></script>
  <script>
    document.getElementById('resto-name').textContent = currentRestaurant.name;
    const myRestaurant = restaurants.find(r => r.id === currentRestaurant.id);
    const tbody = document.getElementById('bundles-body');

    function renderBundles() {
      tbody.innerHTML = '';
      const b = myRestaurant.bundle;
      tbody.innerHTML = `
        <tr>
          <td><strong>${b.title}</strong></td>
          <td style="color:var(--green-bright); font-weight:600;">$${b.price}</td>
          <td>${b.quantity} left</td>
          <td style="color:var(--gray);">${b.pickupTime}</td>
          <td>
            <button onclick="deleteBundle()" style="background:var(--brown); color:var(--white); padding:6px 14px; border:1px solid var(--brown-light); font-size:0.78rem; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; cursor:pointer; font-family:'Courier Prime',monospace;">Remove</button>
          </td>
        </tr>`;
    }
    renderBundles();

    function addBundle() {
      const title = document.getElementById('bundle-title').value;
      const price = document.getElementById('bundle-price').value;
      const qty   = document.getElementById('bundle-qty').value;
      const pickup= document.getElementById('bundle-pickup').value;
      if (!title || !price || !qty || !pickup) { alert('Please fill in all required fields!'); return; }
      alert(`Bundle "${title}" added successfully! 🎉\nIn the real app this would save to the database.`);
      ['bundle-title','bundle-price','bundle-original','bundle-qty','bundle-pickup','bundle-items','bundle-desc']
        .forEach(id => document.getElementById(id).value = '');
    }

    function deleteBundle() {
      if (confirm('Are you sure you want to remove this bundle?')) {
        alert('Bundle removed! In the real app this would delete from the database.');
      }
    }

    function logout() {
      localStorage.removeItem('loggedIn'); localStorage.removeItem('userType');
      window.location.href = 'index.html';
    }
  </script>

  <div id="fairy" onclick="sparkle(this)">🧚‍♀️</div>
  <style>
    #fairy {
      position:fixed; bottom:24px; right:24px; font-size:2.2rem; cursor:pointer; z-index:9999;
      user-select:none; font-family:monospace; background:#f4f1ec;
      border:3px solid #2d6a4f; border-radius:8px; padding:6px 8px;
      box-shadow:4px 4px 0px #1a3d2b, inset 1px 1px 0px rgba(255,255,255,0.9);
      transition:transform 0.1s, box-shadow 0.1s;
    }
    #fairy:hover { box-shadow:2px 2px 0px #1a3d2b, inset 1px 1px 0px rgba(255,255,255,0.9); transform:translate(2px,2px); }
    #fairy:active { box-shadow:0px 0px 0px #1a3d2b; transform:translate(4px,4px); }
    .spark { position:fixed; pointer-events:none; font-size:1.1rem; animation:flyup 1s ease-out forwards; z-index:9999; font-family:monospace; }
    @keyframes flyup { 0%{opacity:1;transform:translateY(0) scale(1)} 25%{transform:translateY(-30px) scale(1.2) rotate(15deg)} 50%{transform:translateY(-60px) scale(0.9) rotate(-15deg)} 100%{opacity:0;transform:translateY(-120px) scale(0.3)} }
  </style>
  <script>
    function sparkle(el) {
      el.style.transition='transform 0.5s'; el.style.transform='rotate(360deg) scale(1.3)';
      setTimeout(()=>{el.style.transform='rotate(0deg) scale(1)'},500);
      const emojis=['✨','💜','🌸','💚','🩷','💫','🌺','💜','✨','🌸','⬛','🟪','🟩','🩷'];
      for(let i=0;i<14;i++){
        setTimeout(()=>{
          const spark=document.createElement('div'); spark.className='spark';
          spark.textContent=emojis[Math.floor(Math.random()*emojis.length)];
          spark.style.left=(Math.random()*window.innerWidth)+'px';
          spark.style.top=(Math.random()*window.innerHeight)+'px';
          spark.style.fontSize=(Math.random()>0.5?'0.8rem':'1.4rem');
          document.body.appendChild(spark); setTimeout(()=>spark.remove(),1000);
        },i*60);
      }
    }
  </script>
</body>
</html>
