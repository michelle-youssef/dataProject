<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Ur Food</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">🍇 Ur<span>Food</span></a>
  </nav>

  <div class="login-page">
    <div class="login-card">
      <h2>Welcome back 👋</h2>
      <p>Sign in to claim your food bundles</p>

      <!-- User type toggle -->
      <div class="user-type-toggle">
        <button class="type-btn active" id="btn-user" onclick="setType('user')">🔮 I'm a Customer</button>
        <button class="type-btn" id="btn-restaurant" onclick="setType('restaurant')">🍽️ I'm a Restaurant</button>
      </div>

      <!-- Login form -->
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>

      <button class="btn-login" onclick="handleLogin()">Sign In</button>

      <div class="login-footer">
        Don't have an account? <a href="#">Sign up free</a>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script>
    let userType = 'user';

    function setType(type) {
      userType = type;
      document.getElementById('btn-user').classList.toggle('active', type === 'user');
      document.getElementById('btn-restaurant').classList.toggle('active', type === 'restaurant');
    }

    function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) {
        alert('Please fill in all fields!');
        return;
      }

      // Save login type to localStorage (fake login for now)
      localStorage.setItem('userType', userType);
      localStorage.setItem('loggedIn', 'true');

      // Redirect based on type
      if (userType === 'restaurant') {
        window.location.href = 'restaurant-dashboard.html';
      } else {
        window.location.href = 'user-dashboard.html';
      }
    }
  </script>

</body>
</html>
